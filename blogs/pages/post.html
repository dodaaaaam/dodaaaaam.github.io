<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/blog.css">
    <link rel="stylesheet" href="/assets/css/post.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
</head>

<body>
    <div id="header"></div>

    <div class="post-hero">
        <img class="post-thumbnail" alt="" />
    </div>

    <main class="post-main">
        <aside class="post-sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title-category">
                    <h3 class="sidebar-title" style="border-bottom: none;">카테고리</h3>
                    <a href="/blogs/pages/blogs.html" class="post-back">&larr;&nbsp;&nbsp; 목록으로</a>
                </div>
                <ul class="sidebar-categories"></ul>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">최신 글</h3>
                <ul class="sidebar-recent"></ul>
            </div>
        </aside>
        <article class="post-container">
            <div class="post-header-container">
                <div class="post-title-container">
                    <div class="post-meta">
                        <span class="post-category"></span>
                        <span class="post-date"></span>
                    </div>
                    <h1 class="post-title"></h1>
                    <div class="post-tags"></div>
                </div>
            </div>
            <aside class="floating-nav-wrapper">
                <div class="floating-nav" id="floatingNav">
                    <button class="floating-nav-toggle" type="button"
                        onclick="document.getElementById('floatingNav').classList.toggle('expanded')" aria-label="메뉴">
                        <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M14.75 6.25C14.75 4.574 15.928 3 17.625 3C19.322 3 20.5 4.574 20.5 6.25C20.5 7.926 19.323 9.5 17.625 9.5C15.927 9.5 14.75 7.926 14.75 6.25ZM1.25 9.75C1.25 8.074 2.428 6.5 4.125 6.5C5.822 6.5 7 8.074 7 9.75C7 11.426 5.822 13 4.125 13C2.428 13 1.25 11.426 1.25 9.75ZM14 11C12.9068 11 11.8252 11.224 10.822 11.6583C9.81873 12.0926 8.91514 12.7279 8.16698 13.525C7.41882 14.322 6.84195 15.264 6.472 16.2927C6.10205 17.3214 5.94686 18.415 6.016 19.506C6.114 21.08 7.012 22.227 8.191 22.953C9.355 23.669 10.82 24 12.208 24H15.792C17.181 24 18.645 23.669 19.809 22.953C20.989 22.227 21.886 21.08 21.984 19.506C21.9947 19.3387 22 19.17 22 19C22 16.8783 21.1571 14.8434 19.6569 13.3431C18.1566 11.8429 16.1217 11 14 11ZM21 9.75C21 8.074 22.177 6.5 23.875 6.5C25.573 6.5 26.75 8.074 26.75 9.75C26.75 11.426 25.573 13 23.875 13C22.177 13 21 11.426 21 9.75ZM7.5 6.25C7.5 4.574 8.678 3 10.375 3C12.072 3 13.25 4.574 13.25 6.25C13.25 7.926 12.072 9.5 10.375 9.5C8.678 9.5 7.5 7.926 7.5 6.25Z"
                                fill="#f6f4f1" />
                        </svg>
                    </button>
                </div>
            </aside>
            <div class="post-body"></div>
        </article>
    </main>

    <script src="/assets/js/common.js"></script>
    <script src="/assets/js/categories.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');

        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // 메타데이터 로드
        Promise.all([
            fetch('/blogs/posts/posts.json').then(res => res.json()),
            Categories.load()
        ])
            .then(([posts, categories]) => {
                const post = posts.find(p => p.slug === slug);
                if (!post) {
                    document.querySelector('.post-body').innerHTML = '<p>글을 찾을 수 없습니다.</p>';
                    return;
                }
                document.querySelector('.post-title').textContent = post.title;
                const parentCat = Categories.parentOf(post.category);
                document.querySelector('.post-category').textContent =
                    parentCat ? `${parentCat}\u00A0\u00A0\u00A0»\u00A0\u00A0\u00A0${post.category}` : post.category;
                document.querySelector('.post-date').textContent = post.date;


                const thumb = document.querySelector('.post-thumbnail');
                if (post.thumbnail) {
                    thumb.src = post.thumbnail;
                    thumb.alt = post.title;
                    document.querySelector('.post-main').classList.add('has-hero');
                } else {
                    document.querySelector('.post-hero').remove();
                }
                document.querySelector('.post-tags').innerHTML =
                    post.tags.map(t => `<span class="blog-card-tag">${t}</span>`).join('');

                // 사이드바: 카테고리 목록 — 현재 글의 카테고리가 parent 본인이거나 parent의 sub 중 하나면 active
                document.querySelector('.sidebar-categories').innerHTML = categories
                    .map(cat => {
                        const isActive = Categories.matches(post, cat.name);
                        return `<li><a class="category-tag ${isActive ? 'active' : ''}" href="/blogs/pages/blogs.html?category=${encodeURIComponent(cat.name)}">${cat.name}</a></li>`;
                    })
                    .join('');

                // 사이드바: 최신 글 5개
                const recent = [...posts]
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 5);
                document.querySelector('.sidebar-recent').innerHTML = recent
                    .map(p => `<li class="sidebar-recent-posts"><a class="sidebar-link ${p.slug === slug ? 'active' : ''}" href="/blogs/pages/post.html?slug=${p.slug}">${p.title}</a><span class="sidebar-date">${p.date}</span></li>`)
                    .join('');
            });

        // 마크다운 로드
        fetch(`/blogs/posts/${slug}.md`)
            .then(res => {
                if (!res.ok) throw new Error('Not found');
                return res.text();
            })
            .then(md => {
                document.querySelector('.post-body').innerHTML = marked.parse(md);
                hljs.highlightAll();
                document.querySelectorAll('.post-body pre').forEach(pre => {
                    const code = pre.querySelector('code');
                    const lang = code?.className.match(/language-(\w+)/)?.[1] || '';
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block';
                    wrapper.dataset.lang = lang;
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);
                });
                document.querySelectorAll('.post-body h1').forEach(h1 => {
                    h1.innerHTML = `<span class="h1-text">${h1.innerHTML}</span>`;
                });
                document.querySelectorAll('.post-body h2').forEach(h2 => {
                    h2.innerHTML = `<span class="h2-text">${h2.innerHTML}</span>`;
                });
                const body = document.querySelector('.post-body');
                body.innerHTML = body.innerHTML
                    .replace(/✔︎/g, '<span class="check-mark">✔︎</span>')
                    .replace(/↪/g, '<span class="arrow-return">↪</span>');
                renderMathInElement(body, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false }
                    ],
                    throwOnError: false
                });
            })
            .catch(() => {
                document.querySelector('.post-body').innerHTML = '<p style="margin-top: 36px;">글 내용을 불러올 수 없습니다.</p>';
            });
    </script>
</body>

</html>
