<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/blog.css">
    <link rel="stylesheet" href="/assets/css/post.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>

<body>
    <div id="header"></div>

    <main class="post-main">
        <aside class="post-sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">카테고리</h3>
                <ul class="sidebar-categories"></ul>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">최신 글</h3>
                <ul class="sidebar-recent"></ul>
            </div>
        </aside>
        <article class="post-container">
            <div class="post-header-container">
                <div class="post-title-container">
                    <div class="post-meta">
                        <span class="post-category"></span>
                        <span class="post-date"></span>
                    </div>
                    <h1 class="post-title"></h1>
                    <div class="post-tags"></div>
                </div>
                <a href="/blogs/pages/blogs.html" class="post-back">&larr; 목록으로</a>
            </div>
            <div class="post-body"></div>
        </article>
    </main>

    <script src="/assets/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');

        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // 메타데이터 로드
        fetch('/blogs/posts/posts.json')
            .then(res => res.json())
            .then(posts => {
                const post = posts.find(p => p.slug === slug);
                if (!post) {
                    document.querySelector('.post-body').innerHTML = '<p>글을 찾을 수 없습니다.</p>';
                    return;
                }
                document.querySelector('.post-title').textContent = post.title;
                document.querySelector('.post-category').textContent = post.category;
                document.querySelector('.post-date').textContent = post.date;
                document.querySelector('.post-tags').innerHTML =
                    post.tags.map(t => `<span class="blog-card-tag">${t}</span>`).join('');

                // 사이드바: 카테고리 목록
                const categories = [...new Set(posts.map(p => p.category))];
                document.querySelector('.sidebar-categories').innerHTML = categories
                    .map(cat => `<li><a class="sidebar-link" href="/blogs/pages/blogs.html?category=${encodeURIComponent(cat)}">${cat}</a></li>`)
                    .join('');

                // 사이드바: 최신 글 5개
                const recent = [...posts]
                    .sort((a, b) => new Date(b.date) - new Date(a.date))
                    .slice(0, 5);
                document.querySelector('.sidebar-recent').innerHTML = recent
                    .map(p => `<li><a class="sidebar-link ${p.slug === slug ? 'active' : ''}" href="/blogs/pages/post.html?slug=${p.slug}">${p.title}</a><span class="sidebar-date">${p.date}</span></li>`)
                    .join('');
            });

        // 마크다운 로드
        fetch(`/blogs/posts/${slug}.md`)
            .then(res => {
                if (!res.ok) throw new Error('Not found');
                return res.text();
            })
            .then(md => {
                document.querySelector('.post-body').innerHTML = marked.parse(md);
                hljs.highlightAll();
            })
            .catch(() => {
                document.querySelector('.post-body').innerHTML = '<p>글 내용을 불러올 수 없습니다.</p>';
            });
    </script>
</body>

</html>
