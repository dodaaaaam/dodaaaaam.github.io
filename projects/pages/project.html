<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/project.css">
    <link rel="stylesheet" href="/assets/css/post.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>

<body>
    <div id="header"></div>

    <main class="project-main">
        <aside class="project-sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">프로젝트</h3>
                <ul class="sidebar-projects"></ul>
            </div>
        </aside>

        <div class="project-detail">
            <div class="project-header-container">
                <div class="project-meta">
                    <span class="project-detail-period"></span>
                    <a href="/projects/projects.html" class="project-detail-back">&larr; 프로젝트 목록</a>
                </div>
                <h1 class="project-detail-title"></h1>
                <p class="project-detail-summary"></p>
                <p class="project-detail-description"></p>
                <div class="project-detail-tags"></div>
            </div>
            <div class="project-detail-body"></div>
        </div>
    </main>

    <script src="/assets/js/common.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        const slug = new URLSearchParams(window.location.search).get('slug');

        marked.setOptions({
            highlight: function (code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        // 메타데이터 로드
        fetch('/projects/posts/projects.json')
            .then(res => res.json())
            .then(projects => {
                const project = projects.find(p => p.slug === slug);
                if (!project) {
                    document.querySelector('.project-detail-body').innerHTML = '<p>프로젝트를 찾을 수 없습니다.</p>';
                    return;
                }
                document.querySelector('.project-detail-title').textContent = project.title;
                document.querySelector('.project-detail-period').textContent = project.period;
                document.querySelector('.project-detail-summary').textContent = project.summary;
                document.querySelector('.project-detail-description').textContent = project.description;
                document.querySelector('.project-detail-tags').innerHTML =
                    project.tags.map(t => `<span class="project-card-tag">${t}</span>`).join('');

                // 사이드바: 프로젝트 목록
                document.querySelector('.sidebar-projects').innerHTML = projects
                    .map(p => `<li><a class="sidebar-link ${p.slug === slug ? 'active' : ''}" href="/projects/pages/project.html?slug=${p.slug}">${p.title}</a></li>`)
                    .join('');
            });

        // 마크다운 로드
        fetch(`/projects/posts/${slug}.md`)
            .then(res => {
                if (!res.ok) throw new Error('Not found');
                return res.text();
            })
            .then(md => {
                document.querySelector('.project-detail-body').innerHTML = marked.parse(md);
                hljs.highlightAll();
                document.querySelectorAll('.project-detail-body pre').forEach(pre => {
                    const code = pre.querySelector('code');
                    const lang = code?.className.match(/language-(\w+)/)?.[1] || '';
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block';
                    wrapper.dataset.lang = lang;
                    pre.parentNode.insertBefore(wrapper, pre);
                    wrapper.appendChild(pre);
                });
                document.querySelectorAll('.project-detail-body h1').forEach(h1 => {
                    h1.innerHTML = `<span class="h1-text">${h1.innerHTML}</span>`;
                });
                document.querySelectorAll('.project-detail-body h2').forEach(h2 => {
                    h2.innerHTML = `<span class="h2-text">${h2.innerHTML}</span>`;
                });
            })
            .catch(() => {
                document.querySelector('.project-detail-body').innerHTML = '<p>프로젝트 내용을 불러올 수 없습니다.</p>';
            });
    </script>
</body>

</html>
